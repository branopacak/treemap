<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: linear-gradient(135deg, #0b2e2e 0%, #0d3d3a 50%, #0a2a2f 100%);
    min-height: 100vh;
    font-family: 'Nunito', sans-serif;
    color: #fff;
    padding: 32px 24px 36px;
  }

  /* ── Header ── */
  .header { max-width: 980px; margin: 0 auto 22px; }
  .pretitle {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: .22em;
    text-transform: uppercase;
    color: #3dd9c8;
    margin-bottom: 6px;
  }
  h1 {
    font-size: clamp(22px, 4vw, 40px);
    font-weight: 900;
    line-height: 1.1;
    letter-spacing: -.01em;
  }
  h1 .accent {
    color: #3dd9c8;
  }
  .arrow {
    display: inline-flex; align-items: center; justify-content: center;
    width: 32px; height: 32px; border-radius: 50%;
    border: 2px solid #3dd9c8;
    color: #3dd9c8;
    font-size: 16px; font-weight: 900;
    margin-left: 10px; vertical-align: middle;
    line-height: 1;
  }
  .subtitle {
    margin-top: 6px;
    font-size: 12px;
    color: rgba(255,255,255,0.45);
    font-weight: 700;
    letter-spacing: .06em;
  }

  /* ── Canvas ── */
  #cv-wrap { max-width: 980px; margin: 0 auto; border-radius: 14px; overflow: hidden; }
  canvas { display: block; width: 100%; cursor: crosshair; }

  /* ── Tooltip ── */
  .tt {
    position: fixed;
    background: #071e1e;
    border-radius: 12px;
    padding: 13px 16px;
    pointer-events: none;
    z-index: 9999;
    display: none;
    min-width: 200px;
    font-family: 'Nunito', sans-serif;
    font-size: 12px;
    border: 1.5px solid #3dd9c8;
    box-shadow: 0 0 24px #3dd9c855;
  }
  .tt-name { font-weight: 900; font-size: 14px; color: #3dd9c8; margin-bottom: 8px; }
  .tt-grid { display: grid; grid-template-columns: 1fr auto; gap: 4px 16px; }
  .tt-k { color: rgba(255,255,255,.45); font-weight: 700; }
  .tt-v { text-align: right; font-weight: 800; }

  /* ── Legend ── */
  .legend {
    max-width: 980px;
    margin: 14px auto 0;
    display: flex; flex-wrap: wrap; gap: 7px 20px;
  }
  .li { display: flex; align-items: center; gap: 7px; font-size: 11px; font-weight: 700; }
  .ld { width: 11px; height: 11px; border-radius: 3px; flex-shrink: 0; }
  .ll { color: rgba(255,255,255,.5); }
  .lv { font-weight: 900; }

  /* ── Footer ── */
  .foot {
    max-width: 980px;
    margin: 14px auto 0;
    border-top: 1px solid rgba(61,217,200,.2);
    padding-top: 10px;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: .1em;
    color: rgba(255,255,255,.2);
  }
</style>
</head>
<body>

<div class="header">
  <div class="pretitle">⚛ Interaktívna mapa</div>
  <h1>JADROVÁ ENERGIA<br><span class="accent">VO SVETE</span><span class="arrow">→</span></h1>
  <div class="subtitle">2,67 PWh celková výroba · 31 krajín · plocha = TWh výroba · klikni na krajinu</div>
</div>

<div id="cv-wrap"><canvas id="cv"></canvas></div>

<div class="tt" id="tt">
  <div class="tt-name" id="tt-n"></div>
  <div class="tt-grid">
    <span class="tt-k">Región</span><span class="tt-v" id="tt-r"></span>
    <span class="tt-k">Výroba</span><span class="tt-v" id="tt-v" style="color:#3dd9c8"></span>
    <span class="tt-k">Glob. podiel</span><span class="tt-v" id="tt-s"></span>
    <span class="tt-k">Reaktory</span><span class="tt-v" id="tt-rc"></span>
  </div>
</div>

<div class="legend" id="leg"></div>
<div class="foot">ZDROJ: WORLD NUCLEAR ASSOCIATION · IAEA PRIS · EMBER GLOBAL ELECTRICITY REVIEW 2025 · DÁTA: 2024</div>

<script>
// ── Dáta: 31 krajín, výroba 2024 v TWh ──────────────────────────────────────
const KRAJINY = [
  // Severná Amerika — jantárová
  {n:"USA",            v:782, r:94, s:29.3, reg:"Severná Amerika",  c:"#f59e0b", a:"#fde68a"},
  {n:"Kanada",         v:96,  r:19, s:3.6,  reg:"Severná Amerika",  c:"#f59e0b", a:"#fde68a"},
  {n:"Mexiko",         v:11,  r:2,  s:0.4,  reg:"Severná Amerika",  c:"#f59e0b", a:"#fde68a"},
  // Európa — tyrkysová (podľa farebnej schémy prezentácie)
  {n:"Francúzsko",     v:379, r:57, s:14.2, reg:"Európa",           c:"#3dd9c8", a:"#ccfaf5"},
  {n:"Rusko",          v:202, r:36, s:7.6,  reg:"Európa",           c:"#3dd9c8", a:"#ccfaf5"},
  {n:"Ukrajina",       v:83,  r:15, s:3.1,  reg:"Európa",           c:"#3dd9c8", a:"#ccfaf5"},
  {n:"Španielsko",     v:58,  r:7,  s:2.2,  reg:"Európa",           c:"#3dd9c8", a:"#ccfaf5"},
  {n:"Švédsko",        v:54,  r:6,  s:2.0,  reg:"Európa",           c:"#3dd9c8", a:"#ccfaf5"},
  {n:"Veľká Británia", v:50,  r:9,  s:1.9,  reg:"Európa",           c:"#3dd9c8", a:"#ccfaf5"},
  {n:"Belgicko",       v:44,  r:7,  s:1.6,  reg:"Európa",           c:"#3dd9c8", a:"#ccfaf5"},
  {n:"Česko",          v:30,  r:6,  s:1.1,  reg:"Európa",           c:"#3dd9c8", a:"#ccfaf5"},
  {n:"Švajčiarsko",    v:26,  r:4,  s:1.0,  reg:"Európa",           c:"#3dd9c8", a:"#ccfaf5"},
  {n:"Fínsko",         v:24,  r:5,  s:0.9,  reg:"Európa",           c:"#3dd9c8", a:"#ccfaf5"},
  {n:"Slovensko",      v:18,  r:5,  s:0.7,  reg:"Európa",           c:"#3dd9c8", a:"#ccfaf5"},
  {n:"Bulharsko",      v:16,  r:2,  s:0.6,  reg:"Európa",           c:"#3dd9c8", a:"#ccfaf5"},
  {n:"Maďarsko",       v:16,  r:4,  s:0.6,  reg:"Európa",           c:"#3dd9c8", a:"#ccfaf5"},
  {n:"Rumunsko",       v:11,  r:2,  s:0.4,  reg:"Európa",           c:"#3dd9c8", a:"#ccfaf5"},
  {n:"Slovinsko",      v:6,   r:1,  s:0.2,  reg:"Európa",           c:"#3dd9c8", a:"#ccfaf5"},
  {n:"Holandsko",      v:4,   r:1,  s:0.1,  reg:"Európa",           c:"#3dd9c8", a:"#ccfaf5"},
  {n:"Arménsko",       v:3,   r:1,  s:0.1,  reg:"Európa",           c:"#3dd9c8", a:"#ccfaf5"},
  // Ázia-Pacifik — modrá
  {n:"Čína",           v:445, r:57, s:16.7, reg:"Ázia-Pacifik",     c:"#38bdf8", a:"#bae6fd"},
  {n:"Južná Kórea",    v:179, r:26, s:6.7,  reg:"Ázia-Pacifik",     c:"#38bdf8", a:"#bae6fd"},
  {n:"Japonsko",       v:85,  r:13, s:3.2,  reg:"Ázia-Pacifik",     c:"#38bdf8", a:"#bae6fd"},
  {n:"India",          v:48,  r:22, s:1.8,  reg:"Ázia-Pacifik",     c:"#38bdf8", a:"#bae6fd"},
  {n:"Pakistan",       v:18,  r:6,  s:0.7,  reg:"Ázia-Pacifik",     c:"#38bdf8", a:"#bae6fd"},
  {n:"Taiwan",         v:12,  r:2,  s:0.4,  reg:"Ázia-Pacifik",     c:"#38bdf8", a:"#bae6fd"},
  {n:"Irán",           v:7,   r:1,  s:0.3,  reg:"Ázia-Pacifik",     c:"#38bdf8", a:"#bae6fd"},
  // Blízky Východ & Afrika — fialová
  {n:"SAE",            v:22,  r:4,  s:0.8,  reg:"Blízky Východ & Afrika", c:"#a78bfa", a:"#ddd6fe"},
  {n:"Južná Afrika",   v:14,  r:2,  s:0.5,  reg:"Blízky Východ & Afrika", c:"#a78bfa", a:"#ddd6fe"},
  // Latinská Amerika — ružová
  {n:"Brazília",       v:16,  r:2,  s:0.6,  reg:"Latinská Amerika", c:"#f472b6", a:"#fbcfe8"},
  {n:"Argentína",      v:8,   r:3,  s:0.3,  reg:"Latinská Amerika", c:"#f472b6", a:"#fbcfe8"},
];

// ── Squarified Treemap (Bruls et al.) ────────────────────────────────────────
function squarify(nodes, x, y, w, h) {
  if (!nodes.length) return;
  if (nodes.length === 1) { Object.assign(nodes[0], {x,y,w,h}); return; }

  function worst(row, side) {
    const s=row.reduce((a,n)=>a+n._a,0);
    const mx=Math.max(...row.map(n=>n._a));
    const mn=Math.min(...row.map(n=>n._a));
    const s2=side*side, ss=s*s;
    return Math.max(s2*mx/ss, ss/(s2*mn));
  }
  function placeRow(row, isV, rx, ry, rw, rh) {
    const s=row.reduce((a,n)=>a+n._a,0);
    const dim=s/(isV?rh:rw);
    let off=0;
    for(const n of row){
      const f=n._a/s;
      if(isV){n.x=rx;n.y=ry+off;n.w=dim;n.h=f*rh;off+=n.h;}
      else   {n.x=rx+off;n.y=ry;n.w=f*rw;n.h=dim;off+=n.w;}
    }
    return isV?[rx+dim,ry,rw-dim,rh]:[rx,ry+dim,rw,rh-dim];
  }
  let rem=[...nodes],rx=x,ry=y,rw=w,rh=h;
  while(rem.length){
    const isV=rh>rw, side=isV?rh:rw;
    let row=[rem[0]],i=1;
    while(i<rem.length){
      const next=[...row,rem[i]];
      if(worst(next,side)>worst(row,side)+1e-9&&row.length>0)break;
      row=next;i++;
    }
    rem.splice(0,row.length);
    [rx,ry,rw,rh]=placeRow(row,isV,rx,ry,rw,rh);
  }
}

// ── Canvas setup ─────────────────────────────────────────────────────────────
const cv=document.getElementById("cv");
const ctx=cv.getContext("2d");
const tt=document.getElementById("tt");
const DPR=window.devicePixelRatio||1;
let cells=[],W=0,H=0;

function hexRgb(h){return h.match(/\w\w/g).map(x=>parseInt(x,16));}

// ── Draw one cell ─────────────────────────────────────────────────────────────
function drawCell(cell, hover) {
  const G=1.5;
  const cx=cell.x+G, cy=cell.y+G, cw=cell.w-G*2, ch=cell.h-G*2;
  if(cw<=0||ch<=0) return;
  const [r,g,b]=hexRgb(cell.c);

  // Background
  ctx.beginPath();
  roundRect(ctx, cx, cy, cw, ch, 8);
  if(hover){
    ctx.fillStyle=`rgba(${r},${g},${b},0.82)`;
  } else {
    const grad=ctx.createLinearGradient(cx,cy,cx+cw,cy+ch);
    grad.addColorStop(0,`rgba(${r},${g},${b},0.18)`);
    grad.addColorStop(1,`rgba(${r},${g},${b},0.08)`);
    ctx.fillStyle=grad;
  }
  ctx.fill();

  // Border
  ctx.strokeStyle=hover?`rgba(${r},${g},${b},1)`:`rgba(${r},${g},${b},0.45)`;
  ctx.lineWidth=hover?2:1;
  ctx.stroke();

  // Subtle inner glow on hover
  if(hover){
    ctx.beginPath();
    roundRect(ctx,cx+2,cy+2,cw-4,ch-4,6);
    ctx.strokeStyle=`rgba(255,255,255,0.15)`;
    ctx.lineWidth=1;
    ctx.stroke();
  }

  // Text clip
  ctx.save();
  ctx.beginPath();
  roundRect(ctx, cx+3, cy+3, cw-6, ch-6, 5);
  ctx.clip();

  const big=cw>120&&ch>70;
  const xp=cx+8;
  const tc=hover?"#fff":cell.a;
  const vc=hover?"#fff":cell.c;
  const rc=hover?"rgba(255,255,255,0.7)":"rgba(255,255,255,0.3)";
  const fs=big?13:cw>70?11:9;

  // Krajina
  if(cw>36&&ch>16){
    ctx.font=`900 ${fs}px 'Nunito',sans-serif`;
    ctx.fillStyle=tc;
    let nm=cell.n;
    if     (cw<46&&nm.length>4)  nm=nm.substring(0,3)+"…";
    else if(cw<68&&nm.length>7)  nm=nm.split(" ")[0].substring(0,6);
    else if(cw<96&&nm.length>10) nm=nm.split(" ")[0];
    ctx.fillText(nm, xp, cy+(big?21:ch>36?15:12));
  }
  // TWh hodnota
  if(cw>50&&ch>32){
    ctx.font=`900 ${big?20:11}px 'Nunito',sans-serif`;
    ctx.fillStyle=vc;
    ctx.fillText(cell.v+" TWh", xp, cy+(big?40:27));
  }
  // Reaktory
  if(cw>72&&ch>52){
    ctx.font=`700 9px 'Nunito',sans-serif`;
    ctx.fillStyle=rc;
    ctx.fillText(cell.r+" reaktor"+(cell.r===1?"":"y/ov"), xp, cy+(big?56:40));
  }
  ctx.restore();
}

function roundRect(c,x,y,w,h,rad){
  if(c.roundRect){c.roundRect(x,y,w,h,rad);return;}
  const r=Math.min(rad,w/2,h/2);
  c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.arcTo(x+w,y,x+w,y+r,r);
  c.lineTo(x+w,y+h-r);c.arcTo(x+w,y+h,x+w-r,y+h,r);
  c.lineTo(x+r,y+h);c.arcTo(x,y+h,x,y+h-r,r);
  c.lineTo(x,y+r);c.arcTo(x,y,x+r,y,r);c.closePath();
}

function redraw(hov){
  ctx.clearRect(0,0,W,H);
  // Dark teal background
  const bg=ctx.createLinearGradient(0,0,W,H);
  bg.addColorStop(0,"#0c3232");
  bg.addColorStop(1,"#0a2828");
  ctx.fillStyle=bg;
  ctx.fillRect(0,0,W,H);
  cells.forEach(c=>drawCell(c,c===hov));
}

function build(){
  const wrap=document.getElementById("cv-wrap");
  W=wrap.clientWidth||960;
  H=Math.round(Math.min(Math.max(W*0.56,300),560));
  cv.width=W*DPR; cv.height=H*DPR; cv.style.height=H+"px";
  ctx.setTransform(DPR,0,0,DPR,0,0);

  const total=KRAJINY.reduce((s,c)=>s+c.v,0);
  cells=KRAJINY.map(c=>({...c,_a:(c.v/total)*W*H})).sort((a,b)=>b._a-a._a);
  squarify(cells,0,0,W,H);
  redraw(null);

  // Legenda
  const REGS={};
  KRAJINY.forEach(c=>{
    if(!REGS[c.reg])REGS[c.reg]={c:c.c,tot:0};
    REGS[c.reg].tot+=c.v;
  });
  const leg=document.getElementById("leg"); leg.innerHTML="";
  Object.entries(REGS).forEach(([name,rd])=>{
    const el=document.createElement("div"); el.className="li";
    el.innerHTML=`<div class="ld" style="background:${rd.c}"></div><span class="ll">${name}</span><span class="lv" style="color:${rd.c}">${rd.tot} TWh</span>`;
    leg.appendChild(el);
  });
}

// ── Interakcia ────────────────────────────────────────────────────────────────
let hov=null;
cv.addEventListener("mousemove",ev=>{
  const rect=cv.getBoundingClientRect();
  const mx=(ev.clientX-rect.left)*(W/rect.width);
  const my=(ev.clientY-rect.top)*(H/rect.height);
  const found=[...cells].reverse().find(c=>mx>=c.x&&mx<=c.x+c.w&&my>=c.y&&my<=c.y+c.h)||null;
  if(found!==hov){
    hov=found; redraw(hov);
    if(found){
      tt.style.display="block";
      document.getElementById("tt-n").textContent=found.n;
      document.getElementById("tt-r").textContent=found.reg;
      document.getElementById("tt-v").textContent=found.v+" TWh";
      document.getElementById("tt-s").textContent=found.s+"%";
      document.getElementById("tt-rc").textContent=found.r;
    } else tt.style.display="none";
  }
  if(found){
    let tx=ev.clientX+16, ty=ev.clientY-12;
    if(tx+215>window.innerWidth) tx=ev.clientX-225;
    if(ty+148>window.innerHeight) ty=ev.clientY-158;
    tt.style.left=tx+"px"; tt.style.top=ty+"px";
  }
});
cv.addEventListener("mouseleave",()=>{hov=null;tt.style.display="none";redraw(null);});
build();
window.addEventListener("resize",()=>{clearTimeout(window._rt);window._rt=setTimeout(build,130);});
</script>
</body>
</html>
